sonar.projectKey=Hospital-map
sonar.projectName=Hospital-map
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Server URL
sonar.host.url=http://localhost:9000
# Token
sonar.token=sqp_88ac4247ddcdf30d1366a3780c5ff16ac8369093

# Exclude node_modules, build outputs, and config files
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/.next/**,**/*.config.js,**/*.config.ts,**/*.config.mjs,**/Dockerfile,**/.dockerignore

# Source code location - only TypeScript source files
sonar.sources=backend/src,frontend/src

# Test files location
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.ts

# Coverage reports (LCOV format)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Coverage exclusions - exclude React components (require integration tests), entry points, and config
sonar.coverage.exclusions=**/server.ts,**/*.tsx,**/globals.css